<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Monitoring IoT</title>
  <style>
    /* ========== VARIABLES ========== */
    :root {
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --text: #1f2937;
      --text-soft: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
      --success: #10b981;
      --gradient: linear-gradient(135deg, #4f46e5, #7c3aed);
    }

    /* ========== RESET & BASE ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    /* ========== LOGIN PAGE STYLES ========== */
    .login-body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1000px 500px at 10% 10%, rgba(124,58,237,.18), transparent 60%),
        radial-gradient(900px 500px at 90% 90%, rgba(6,182,212,.16), transparent 60%),
        #0b1020;
      padding: 24px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }

    .login-card {
      padding: 48px 44px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand img {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      object-fit: contain;
    }

    .login-brand h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.01em;
      color: var(--text);
    }

    .login-brand p {
      color: var(--text-soft);
      font-size: 14px;
      margin-top: 6px;
    }

    .login-form .form-group {
      margin-bottom: 18px;
    }

    .login-form label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .login-form input[type="email"],
    .login-form input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      transition: border .15s ease, box-shadow .15s ease;
      outline: none;
      background: #fafbfd;
    }

    .login-form input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,70,229,.12);
      background: #fff;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 20px;
    }

    .checkbox {
      font-size: 13px;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .link {
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-block;
      font-weight: 600;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      width: 100%;
      font-size: 14px;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-block {
      display: block;
      width: 100%;
    }

    .form-message {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .form-message.error {
      color: var(--danger);
    }

    .form-message.success {
      color: var(--success);
    }

    .form-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 13px;
      color: var(--text-soft);
    }

    .login-art {
      position: relative;
      background: var(--gradient);
      color: #fff;
      display: grid;
      place-items: center;
      padding: 48px;
      overflow: hidden;
    }

    .login-art::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(400px 200px at 80% 20%, rgba(255,255,255,.25), transparent 60%);
    }

    .art-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 320px;
    }

    .art-content h2 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.15;
    }

    .art-content p {
      margin-top: 12px;
      opacity: .9;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .login-form .input-wrapper input {
      padding-right: 42px !important;
    }

    .toggle-pass-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      transition: opacity 0.2s ease;
    }

    .toggle-pass-btn:hover {
      opacity: 0.7;
    }

    @media (max-width: 760px) {
      .login-wrapper {
        grid-template-columns: 1fr;
        max-width: 440px;
      }
      .login-art {
        display: none;
      }
      .login-card {
        padding: 36px 28px;
      }
    }
  </style>
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="img/logo.png" alt="Logo" />
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk untuk mengakses dashboard monitoring Anda</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="nama@email.com" required />
        </div>
        <div class="form-group password-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pass-btn" onclick="togglePassword()">👁️</button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" /> Ingat saya
          </label>
          <a href="#" class="link">Lupa password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        <p id="loginMessage" class="form-message"></p>
        <p class="form-footer">Belum punya akun? <a href="#" class="link">Daftar di sini</a></p>
      </form>
    </div>

    <div class="login-art">
      <div class="art-content">
        <h2>Monitoring <br/>Lebih Cerdas</h2>
        <p>Pantau seluruh sensor IoT Anda dalam satu dashboard yang elegan dan modern.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
